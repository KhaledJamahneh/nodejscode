name: einhod_water
description: Water Delivery Management System - Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  
  # Routing
  go_router: ^13.0.0
  
  # HTTP & API
  dio: ^5.4.0
  json_annotation: ^4.8.1
  
  # Local Storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.2.2
  
  # UI Components
  cupertino_icons: ^1.0.6
  google_fonts: ^6.0.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  
  # Location
  geolocator: ^13.0.0
  mobile_scanner: ^5.0.0
  geolocator_linux: ^0.2.4
  geocoding: ^4.0.0
  battery_plus: ^7.0.0
  
  # Notifications
  flutter_local_notifications: ^17.0.0
  
  # Utils
  intl: any
  timeago: ^3.6.0
  url_launcher: ^6.2.2
  image_picker: ^1.0.7
  permission_handler: ^12.0.1

  # Icons
  font_awesome_flutter: ^10.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
  
  assets:
    - assets/images/
    - assets/icons/
  
  fonts:
    - family: CustomIcons
      fonts:
        - asset: assets/fonts/CustomIcons.ttf
